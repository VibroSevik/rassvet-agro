services:
    webserver:
        build: .
        container_name: opencart-web
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./php.ini:/usr/local/etc/php/php.ini
        depends_on:
            - database
        environment:
            - APACHE_DOCUMENT_ROOT=/var/www/html
        working_dir: /var/www/html
        networks:
            - opencart-network

    database:
        image: mysql:5.7
        container_name: opencart-db
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root_password
            MYSQL_DATABASE: opencart_db
            MYSQL_USER: opencart_user
            MYSQL_PASSWORD: user_password
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - opencart-network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: opencart-phpmyadmin
        ports:
            - "8081:80"
        environment:
            PMA_HOST: database
            PMA_PORT: 3306
        depends_on:
            - database
        networks:
            - opencart-network

networks:
    opencart-network:
        driver: bridge

volumes:
    db_data: